<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avdelningsassistent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div class="hero-row">
          <h1>Avdelningsassistent</h1>
          <div class="hero-actions">
            <p id="today-date" class="today-date"></p>
            <button id="toggle-nav-button" class="chip-button menu-toggle" type="button">
              Meny
            </button>
          </div>
        </div>
      </header>

      <nav id="top-nav" class="top-nav" aria-label="Huvudnavigation">
        <button class="nav-tab active" data-view-tab="patients" type="button">Mina patienter</button>
        <button class="nav-tab" data-view-tab="completed" type="button">
          Avklarade idag <span id="completed-nav-count"></span>
        </button>
        <button id="seed-demo" class="ghost-button nav-action" type="button">Ladda exempeldag</button>
        <button id="clear-patients" class="ghost-button" type="button">Rensa alla patienter</button>
      </nav>

      <main>
        <section class="view active" data-view="patients">
          <section class="card">
            <div class="section-header">
              <div>
                <p class="section-kicker">Patienter</p>
              </div>
              <button id="toggle-patient-form" class="primary-button primary-button-small" type="button">
                Ny patient
              </button>
            </div>

            <div id="patient-form-panel" class="collapsible" hidden>
              <form id="patient-form" class="stack-form">
                <div class="form-header">
                  <p id="patient-form-title" class="form-title">Ny patient</p>
                  <button id="cancel-edit-button" class="chip-button" type="button" hidden>Avbryt redigering</button>
                </div>
                <label>
                  Alias / rum
                  <input name="name" placeholder="t.ex. Sal 3A / Anna K." required />
                </label>
                <label>
                  Ankomstdatum
                  <input name="arrivalDate" type="date" />
                </label>
                <label>
                  S
                  <input name="reason" placeholder="t.ex. STEMI" required />
                </label>
                <label>
                  B
                  <textarea
                    id="history-input"
                    name="history"
                    rows="2"
                    placeholder="t.ex. hypertoni, diabetes typ 2"
                  ></textarea>
                </label>
                <label>
                  Labbprov
                  <textarea
                    id="lab-input"
                    name="labs"
                    rows="2"
                    placeholder="t.ex. Troponin 3200, Hb 132, Krea 94"
                  ></textarea>
                </label>
                <label>
                  Undersokningar
                  <textarea
                    id="exam-input"
                    name="exams"
                    rows="2"
                    placeholder="t.ex. EKO: EF 35 %, lungrontgen med stasbild"
                  ></textarea>
                </label>
                <label>
                  A
                  <textarea
                    name="status"
                    rows="2"
                    placeholder="t.ex. vatska pa lungorna, men andas lugnt i vila"
                    required
                  ></textarea>
                </label>
                <button id="save-patient-button" type="submit" class="primary-button">Spara patient</button>
              </form>
            </div>
            <div id="patient-list" class="list"></div>
          </section>
        </section>

        <section class="view" data-view="completed">
          <section class="card">
            <div class="section-header">
              <div>
                <p class="section-kicker">Klart</p>
              </div>
              <button id="clear-completed-button" class="ghost-button primary-button-small" type="button">
                Rensa avklarade
              </button>
            </div>

            <div id="completed-task-list" class="list"></div>
          </section>
        </section>
      </main>
      <button id="floating-action-button" class="floating-action-button" type="button" aria-label="Snabbval">
        Ny
      </button>
    </div>

    <script src="storage.js"></script>
    <script src="app.js"></script>
  </body>
</html>
